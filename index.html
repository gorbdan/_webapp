<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10131f" />
    <title>Библиотека промптов</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1 id="appTitle">Библиотека</h1>
        <div class="topbar-actions">
          <button class="balance-pill" id="balancePill" type="button" title="Пополнить баланс">
            <svg class="balance-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="var(--accent)"/><ellipse cx="10" cy="9.5" rx="3" ry="2" fill="rgba(255,255,255,0.25)" transform="rotate(-25 10 9.5)"/></svg>
            <span id="balanceCount">0</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="icon-button" id="themeToggle" type="button" aria-label="Переключить тему" title="Тема">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </header>

      <main id="pageKatalog" class="tab-page">
        <section class="toolbar" aria-label="Фильтры библиотеки">
          <label class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="searchInput" type="search" placeholder="Поиск по названию или промпту" autocomplete="off" />
          </label>
          <div class="segmented" role="group" aria-label="Тип шаблонов">
            <button class="segment active" type="button" data-filter="all">Все</button>
            <button class="segment" type="button" data-filter="new">🆕 Новинки</button>
            <button class="segment" type="button" data-filter="photo">Фото</button>
            <button class="segment" type="button" data-filter="video">Видео</button>
            <button class="segment" type="button" data-filter="favorites">Избранное</button>
          </div>
        </section>

        <button class="cat-trigger" id="categoryTrigger" type="button" aria-haspopup="dialog">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span id="categoryTriggerLabel">Все категории</span>
          <svg class="cat-trigger-chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <section class="grid" id="cards" aria-live="polite"></section>
        <div class="empty hidden" id="empty"></div>
      </main>

      <div id="pageHistory" class="tab-page hidden">
        <p class="page-hint">Последние 10 генераций</p>
        <div class="history-grid" id="historyGrid"></div>
        <div class="empty-state" id="historyEmpty">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <p>У вас ещё нет генераций</p>
          <button class="ghost-btn" type="button" id="historyToCatalog">Перейти в каталог</button>
        </div>
      </div>

      <div id="pageTopup" class="tab-page hidden">
        <div class="balance-card">
          <p class="balance-label">Ваш баланс</p>
          <div class="balance-big">
            <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="var(--accent)"/><ellipse cx="10" cy="9.5" rx="3" ry="2" fill="rgba(255,255,255,0.25)" transform="rotate(-25 10 9.5)"/></svg>
            <span id="balanceDisplay">0</span>
            <span class="balance-unit" id="balanceUnit">изюминок</span>
          </div>
        </div>
        <div class="packages" id="packages">
          <button class="package" type="button" data-amount="10" data-price="90">
            <div class="package-info">
              <span class="package-amount">Проба</span>
              <span class="package-price">90 ₽ · 10 изюминок</span>
            </div>
            <span class="primary-btn package-btn">Купить</span>
          </button>
          <button class="package" type="button" data-amount="30" data-price="240">
            <div class="package-info">
              <span class="package-amount">Фотосессия</span>
              <span class="package-price">240 ₽ · 30 изюминок</span>
            </div>
            <span class="primary-btn package-btn">Купить</span>
          </button>
          <button class="package" type="button" data-amount="70" data-price="490">
            <div class="package-info">
              <span class="package-amount">Контент-неделя</span>
              <span class="package-price">490 ₽ · 70 изюминок</span>
            </div>
            <span class="primary-btn package-btn">Купить</span>
          </button>
          <button class="package" type="button" data-amount="150" data-price="900">
            <div class="package-info">
              <span class="package-amount">Про</span>
              <span class="package-price">900 ₽ · 150 изюминок</span>
            </div>
            <span class="primary-btn package-btn">Купить</span>
          </button>
          <button class="package package--accent" type="button" data-amount="350" data-price="1750">
            <span class="package-tag">−44% 🔥</span>
            <div class="package-info">
              <span class="package-amount">Студия</span>
              <span class="package-price">1 750 ₽ · 350 изюминок</span>
            </div>
            <span class="primary-btn package-btn">Купить</span>
          </button>
        </div>
      </div>
    </div>

    <nav class="tab-bar" id="tabBar">
      <button class="tab active" type="button" data-tab="katalog">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Каталог</span>
      </button>
      <button class="tab" type="button" data-tab="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>История</span>
      </button>
      <button class="tab" type="button" data-tab="topup">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Пополнить</span>
      </button>
    </nav>

    <div class="toast hidden" id="toast" role="status"></div>

    <dialog class="modal" id="detailsModal">
      <div class="modal-shell">
        <button class="icon-button modal-close" id="modalClose" type="button" aria-label="Закрыть" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="modal-media" id="modalMedia"></div>
        <div class="modal-body">
          <p class="eyebrow" id="modalMeta"></p>
          <h2 id="modalTitle"></h2>
          <pre id="modalPrompt"></pre>
          <div class="modal-hint hidden" id="modalUploadHint"></div>
          <textarea class="modal-note hidden" id="modalNote" rows="2" maxlength="300"></textarea>
          <div class="modal-actions">
            <button class="ghost-btn" id="modalCopy" type="button">Копировать</button>
            <button class="primary-btn" id="modalUse" type="button">Использовать</button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog class="sheet" id="categorySheet">
      <div class="sheet-shell">
        <div class="sheet-header">
          <h3>Категории</h3>
          <button class="icon-button" id="categorySheetClose" type="button" aria-label="Закрыть" title="Закрыть">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="chips chips--sheet" id="categories" aria-label="Категории"></div>
      </div>
    </dialog>

    <script src="./app.js?v=20260623-uxv3"></script>
  </body>
</html>
